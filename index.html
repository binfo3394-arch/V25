<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SanChat — Group Video & Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, onChildAdded, remove, onDisconnect, off } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ========== FIREBASE CONFIG ==========
  const firebaseConfig = {
    apiKey: "AIzaSyA1Jc_WVmTMzOEqRXThTm4oJEXzqhvpsiM",
    authDomain: "sanchat-611e1.firebaseapp.com",
    databaseURL: "https://sanchat-611e1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "sanchat-611e1",
    storageBucket: "sanchat-611e1.firebasestorage.app",
    messagingSenderId: "792529827830",
    appId: "1:792529827830:web:0e5d3c30731fd172b079d7",
    measurementId: "G-74S2Q6HDV2"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ========== STATE ==========
  let localStream  = null;
  let peers        = {};          // remoteId → { pc, iceBuf }
  let currentRoom  = null;
  let currentUser  = null;
  let userId       = 'u_' + Math.random().toString(36).substr(2, 9);
  let isMuted      = false;
  let isVideoOff   = false;
  let callMode     = 'video';     // 'video' | 'audio'
  let unsubFns     = [];

  // Free public STUN + TURN servers (metered.ca free tier)
  const RTC_CONFIG = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'stun:openrelay.metered.ca:80' },
      {
        urls: 'turn:openrelay.metered.ca:80',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:openrelay.metered.ca:443',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      },
      {
        urls: 'turn:openrelay.metered.ca:443?transport=tcp',
        username: 'openrelayproject',
        credential: 'openrelayproject'
      }
    ]
  };

  // ========== UI HELPERS ==========
  const $    = id => document.getElementById(id);
  const show = id => $(id).style.display = 'flex';
  const hide = id => $(id).style.display = 'none';

  function showNotif(msg, type = 'info') {
    const n = document.createElement('div');
    n.className = `notif notif-${type}`;
    n.textContent = msg;
    document.body.appendChild(n);
    setTimeout(() => n.classList.add('show'), 10);
    setTimeout(() => { n.classList.remove('show'); setTimeout(() => n.remove(), 400); }, 3500);
  }

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function addVideoTile(uid, stream, name, audioOnly = false) {
    if (document.querySelector(`[data-uid="${uid}"]`)) return;
    const grid = $('video-grid');
    const tile = document.createElement('div');
    tile.className = 'video-tile' + (audioOnly ? ' audio-only' : '');
    tile.dataset.uid = uid;

    if (!audioOnly) {
      const video = document.createElement('video');
      video.autoplay = true;
      video.playsInline = true;
      video.muted = (uid === userId);
      if (stream) video.srcObject = stream;
      tile.appendChild(video);
    } else {
      // audio element (hidden) for playback
      if (stream && uid !== userId) {
        const audio = document.createElement('audio');
        audio.autoplay = true;
        audio.srcObject = stream;
        tile.appendChild(audio);
      }
      const av = document.createElement('div');
      av.className = 'audio-avatar';
      av.innerHTML = `<div class="avatar-circle">${getInitials(name)}</div>`;
      tile.appendChild(av);
    }

    const label = document.createElement('div');
    label.className = 'tile-label';
    label.textContent = name || uid;
    tile.appendChild(label);

    grid.appendChild(tile);
    updateGridLayout();
  }

  // Update an existing tile's stream (e.g. when remote track arrives)
  function updateTileStream(uid, stream, audioOnly) {
    const tile = document.querySelector(`[data-uid="${uid}"]`);
    if (!tile) return;
    if (!audioOnly) {
      let video = tile.querySelector('video');
      if (!video) {
        video = document.createElement('video');
        video.autoplay = true;
        video.playsInline = true;
        video.muted = (uid === userId);
        tile.insertBefore(video, tile.firstChild);
        tile.classList.remove('audio-only');
        // remove avatar if present
        tile.querySelector('.audio-avatar')?.remove();
      }
      video.srcObject = stream;
    } else {
      let audio = tile.querySelector('audio');
      if (!audio) {
        audio = document.createElement('audio');
        audio.autoplay = true;
        tile.appendChild(audio);
      }
      audio.srcObject = stream;
    }
  }

  function removeVideoTile(uid) {
    document.querySelector(`[data-uid="${uid}"]`)?.remove();
    updateGridLayout();
  }

  function updateGridLayout() {
    const grid = $('video-grid');
    const count = grid.children.length;
    if (count === 0) return;
    const cols = count === 1 ? 1 : count <= 4 ? 2 : count <= 9 ? 3 : 4;
    const rows = Math.ceil(count / cols);
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    grid.style.gridTemplateRows    = `repeat(${rows}, 1fr)`;
  }

  // ========== WEBRTC ==========
  // Signaling paths:
  //   offer  : rooms/{room}/offers/{toId}/{fromId}
  //   answer : rooms/{room}/answers/{toId}/{fromId}
  //   ICE    : rooms/{room}/ice/{toId}/{fromId}/...

  function createPeerConnection(remoteId) {
    const pc    = new RTCPeerConnection(RTC_CONFIG);
    const iceBuf = [];   // buffer ICE until remoteDescription is set
    peers[remoteId] = { pc, iceBuf };

    // Add local tracks
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    // My ICE → write to ice/{remoteId}/{myId}
    pc.onicecandidate = e => {
      if (e.candidate) {
        push(ref(db, `rooms/${currentRoom}/ice/${remoteId}/${userId}`), e.candidate.toJSON());
      }
    };

    pc.onconnectionstatechange = () => {
      console.log(`[${remoteId}] connection: ${pc.connectionState}`);
      if (pc.connectionState === 'failed') {
        pc.restartIce();
      }
    };

    // Remote tracks → render
    const remoteStream = new MediaStream();
    pc.ontrack = e => {
      e.track.onunmute = () => {
        remoteStream.addTrack(e.track);
        get(ref(db, `rooms/${currentRoom}/users/${remoteId}`)).then(snap => {
          const name     = snap.val()?.name || remoteId;
          const hasVideo = remoteStream.getVideoTracks().length > 0;
          const audioOnly = callMode === 'audio' || !hasVideo;
          if (!document.querySelector(`[data-uid="${remoteId}"]`)) {
            addVideoTile(remoteId, remoteStream, name, audioOnly);
          } else {
            updateTileStream(remoteId, remoteStream, audioOnly);
          }
        });
      };
    };

    // Listen for ICE from remote: ice/{myId}/{remoteId}
    const iceRef = ref(db, `rooms/${currentRoom}/ice/${userId}/${remoteId}`);
    const iceUnsub = onChildAdded(iceRef, async snap => {
      const cand = snap.val();
      if (!cand) return;
      if (pc.remoteDescription) {
        try { await pc.addIceCandidate(new RTCIceCandidate(cand)); } catch {}
      } else {
        iceBuf.push(cand);
      }
    });
    unsubFns.push(iceUnsub);

    return pc;
  }

  async function flushIceBuf(remoteId) {
    const entry = peers[remoteId];
    if (!entry) return;
    const { pc, iceBuf } = entry;
    while (iceBuf.length) {
      const cand = iceBuf.shift();
      try { await pc.addIceCandidate(new RTCIceCandidate(cand)); } catch {}
    }
  }

  // Caller side
  async function makeOffer(remoteId) {
    if (peers[remoteId]) return;
    const pc = createPeerConnection(remoteId);

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Write offer → offers/{remoteId}/{myId}
    await set(ref(db, `rooms/${currentRoom}/offers/${remoteId}/${userId}`), {
      sdp: pc.localDescription.sdp,
      type: pc.localDescription.type
    });

    // Listen for answer → answers/{myId}/{remoteId}
    const ansRef = ref(db, `rooms/${currentRoom}/answers/${userId}/${remoteId}`);
    const ansUnsub = onValue(ansRef, async snap => {
      if (!snap.val()) return;
      if (pc.signalingState !== 'have-local-offer') return;
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
        await flushIceBuf(remoteId);
      } catch (err) { console.warn('setRemoteDesc answer err', err); }
    });
    unsubFns.push(ansUnsub);
  }

  // Callee side
  async function handleOffer(fromId, offerData) {
    if (peers[fromId]) return;
    const pc = createPeerConnection(fromId);

    try {
      await pc.setRemoteDescription(new RTCSessionDescription(offerData));
      await flushIceBuf(fromId);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      // Write answer → answers/{fromId}/{myId}
      await set(ref(db, `rooms/${currentRoom}/answers/${fromId}/${userId}`), {
        sdp: pc.localDescription.sdp,
        type: pc.localDescription.type
      });
    } catch (err) { console.warn('handleOffer err', err); }
  }

  // ========== ROOM ==========
  async function joinRoom(roomId, userName) {
    currentRoom = roomId;
    currentUser = userName;

    // Get media
    try {
      if (callMode === 'video') {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      } else {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      }
    } catch (err) {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        callMode = 'audio';
        showNotif('Camera not available — voice only', 'warning');
      } catch {
        throw new Error('Microphone access denied');
      }
    }

    addVideoTile(userId, localStream, userName + ' (You)', callMode === 'audio');

    // Register presence
    const userRef = ref(db, `rooms/${roomId}/users/${userId}`);
    await set(userRef, { name: userName, joinedAt: Date.now(), mode: callMode });
    onDisconnect(userRef).remove();

    // ── Listeners ──────────────────────────────────────────────────────────
    unsubFns = [];

    // New user joins → I offer them
    const u1 = onChildAdded(ref(db, `rooms/${roomId}/users`), async snap => {
      const rid = snap.key;
      if (rid === userId) return;
      showNotif(`${snap.val().name} joined`, 'info');
      await makeOffer(rid);
    });
    unsubFns.push(u1);

    // Someone sent me an offer
    const u2 = onChildAdded(ref(db, `rooms/${roomId}/offers/${userId}`), async snap => {
      await handleOffer(snap.key, snap.val());
    });
    unsubFns.push(u2);

    // User leaves
    const u3 = onValue(ref(db, `rooms/${roomId}/users`), snap => {
      const active = snap.val() ? Object.keys(snap.val()) : [];
      Object.keys(peers).forEach(pid => {
        if (!active.includes(pid)) {
          peers[pid]?.pc?.close();
          delete peers[pid];
          removeVideoTile(pid);
          showNotif('A user left', 'warning');
        }
      });
    });
    unsubFns.push(u3);

    // Chat
    const u4 = onChildAdded(ref(db, `rooms/${roomId}/chat`), snap => {
      if (snap.val()) renderChatMsg(snap.val());
    });
    unsubFns.push(u4);

    hide('join-screen');
    show('call-screen');
    $('room-id-display').textContent = roomId;

    if (callMode === 'audio') {
      $('btn-video').style.opacity = '0.4';
      $('btn-video').style.pointerEvents = 'none';
      $('call-mode-badge').textContent = '🎙️ Voice Call';
    } else {
      $('call-mode-badge').textContent = '📹 Video Call';
    }
  }

  // ========== CHAT ==========
  async function sendChat() {
    const input = $('chat-input');
    const text  = input.value.trim();
    if (!text || !currentRoom) return;
    input.value = '';
    await push(ref(db, `rooms/${currentRoom}/chat`), {
      text, name: currentUser, uid: userId, ts: Date.now()
    });
  }

  function renderChatMsg(data) {
    const box   = $('chat-messages');
    const isMine = data.uid === userId;
    const div   = document.createElement('div');
    div.className = `chat-msg ${isMine ? 'mine' : 'theirs'}`;
    div.innerHTML = `<span class="msg-name">${data.name}</span><p>${escapeHtml(data.text)}</p>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ========== LEAVE ==========
  async function leaveRoom() {
    unsubFns.forEach(fn => { try { fn(); } catch {} });
    unsubFns = [];

    Object.values(peers).forEach(({ pc }) => pc?.close());
    peers = {};

    localStream?.getTracks().forEach(t => t.stop());
    localStream = null;

    if (currentRoom) {
      await remove(ref(db, `rooms/${currentRoom}/users/${userId}`));
    }
    currentRoom = null;

    // Reset UI
    callMode = 'video';
    isMuted  = false;
    isVideoOff = false;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector('.mode-btn[data-mode="video"]')?.classList.add('selected');
    $('btn-join').disabled  = false;
    $('btn-join').textContent = 'Join Room →';
    $('btn-video').style.opacity = '';
    $('btn-video').style.pointerEvents = '';
    $('btn-mute').classList.remove('active');
    $('btn-mute').querySelector('.ctrl-icon').textContent = '🎙️';
    $('btn-video').classList.remove('active');
    $('btn-video').querySelector('.ctrl-icon').textContent = '📹';

    $('video-grid').innerHTML   = '';
    $('chat-messages').innerHTML = '';
    hide('call-screen');
    show('join-screen');
    showNotif('Left the room', 'info');
  }

  // ========== CONTROLS ==========
  function toggleMute() {
    isMuted = !isMuted;
    localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
    $('btn-mute').classList.toggle('active', isMuted);
    $('btn-mute').querySelector('.ctrl-icon').textContent = isMuted ? '🔇' : '🎙️';
  }

  function toggleVideo() {
    if (callMode === 'audio') { showNotif('Voice call — video disabled', 'warning'); return; }
    isVideoOff = !isVideoOff;
    localStream?.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
    $('btn-video').classList.toggle('active', isVideoOff);
    $('btn-video').querySelector('.ctrl-icon').textContent = isVideoOff ? '📵' : '📹';
    const myTile = document.querySelector(`[data-uid="${userId}"]`);
    if (myTile) {
      if (isVideoOff) {
        myTile.querySelector('video') && (myTile.querySelector('video').style.display = 'none');
        if (!myTile.querySelector('.audio-avatar')) {
          const av = document.createElement('div');
          av.className = 'audio-avatar';
          av.innerHTML = `<div class="avatar-circle">${getInitials(currentUser)}</div>`;
          myTile.insertBefore(av, myTile.querySelector('.tile-label'));
        }
      } else {
        myTile.querySelector('video') && (myTile.querySelector('video').style.display = '');
        myTile.querySelector('.audio-avatar')?.remove();
      }
    }
  }

  function toggleChat() { $('chat-panel').classList.toggle('open'); }

  function copyRoomId() {
    navigator.clipboard.writeText($('room-id-display').textContent);
    showNotif('Room ID copied!', 'success');
  }

  // ========== INIT ==========
  window.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        callMode = btn.dataset.mode;
      });
    });

    $('btn-join').addEventListener('click', async () => {
      const name = $('input-name').value.trim();
      const room = $('input-room').value.trim() || 'room_' + Math.random().toString(36).substr(2, 6);
      if (!name) { showNotif('Please enter your name', 'error'); return; }
      $('btn-join').disabled   = true;
      $('btn-join').textContent = 'Joining…';
      try {
        await joinRoom(room, name);
      } catch (e) {
        showNotif('Error: ' + e.message, 'error');
        $('btn-join').disabled   = false;
        $('btn-join').textContent = 'Join Room →';
      }
    });

    $('btn-leave').addEventListener('click', leaveRoom);
    $('btn-mute').addEventListener('click', toggleMute);
    $('btn-video').addEventListener('click', toggleVideo);
    $('btn-chat').addEventListener('click', toggleChat);
    $('btn-copy-room').addEventListener('click', copyRoomId);
    $('chat-send').addEventListener('click', sendChat);
    $('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
    $('btn-new-room').addEventListener('click', () => {
      $('input-room').value = 'room_' + Math.random().toString(36).substr(2, 6);
    });
  });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0b0f;
    --surface: #13151c;
    --surface2: #1c1f2a;
    --border: #252836;
    --accent: #6c63ff;
    --accent2: #ff6b9d;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #f0f0f8;
    --text-dim: #8b8fa8;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== JOIN SCREEN ===== */
  #join-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #1a1040 0%, var(--bg) 70%);
    position: relative;
    overflow: hidden;
  }

  #join-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    top: -200px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }

  .join-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow), 0 0 80px rgba(108,99,255,0.08);
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }

  .tagline {
    color: var(--text-dim);
    font-size: 0.875rem;
    margin-bottom: 36px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }

  .room-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .room-row input { margin-bottom: 0; flex: 1; }

  .btn-icon {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.02em;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .features {
    display: flex;
    gap: 16px;
    margin-top: 32px;
    justify-content: center;
  }

  .feature-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.75rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ===== CALL SCREEN ===== */
  #call-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    min-height: 0;
  }

  /* Top bar */
  .call-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }

  .call-bar .logo { font-size: 1.2rem; margin-bottom: 0; }

  .room-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .room-badge:hover { border-color: var(--accent); }
  .room-badge span { font-family: 'Syne', sans-serif; color: var(--text); font-weight: 600; }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { box-shadow: 0 0 0 6px rgba(74,222,128,0); }
  }

  /* Main content */
  .call-content {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
    min-height: 0;
  }

  /* Video grid */
  #video-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-rows: 1fr;
    gap: 6px;
    padding: 8px;
    overflow: hidden;
    background: #050507;
    min-height: 0;
    height: 100%;
    transition: grid-template-columns 0.3s, grid-template-rows 0.3s;
  }

  .video-tile {
    position: relative;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    min-height: 0;
    height: 100%;
    border: 1px solid var(--border);
  }

  .video-tile video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .tile-label {
    position: absolute;
    bottom: 10px; left: 12px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.8rem;
    font-weight: 500;
    color: #fff;
  }

  /* Chat panel */
  #chat-panel {
    width: 0;
    overflow: hidden;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.3s ease;
    flex-shrink: 0;
  }

  #chat-panel.open { width: 320px; }

  .chat-header {
    padding: 16px 20px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    color: var(--text);
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 90%;
  }

  .chat-msg.mine { align-self: flex-end; align-items: flex-end; }
  .chat-msg.theirs { align-self: flex-start; }

  .msg-name {
    font-size: 0.7rem;
    color: var(--text-dim);
    padding: 0 4px;
    font-weight: 600;
  }

  .chat-msg p {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 14px;
    font-size: 0.875rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .chat-msg.mine p {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-color: transparent;
    color: #fff;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #chat-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    margin: 0;
    height: 42px;
  }

  #chat-input:focus { border-color: var(--accent); }

  #chat-send {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 42px;
    height: 42px;
    color: #fff;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }
  #chat-send:hover { opacity: 0.85; transform: scale(1.05); }

  /* Controls bar */
  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .ctrl-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 64px;
    color: var(--text);
  }

  .ctrl-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.1); }
  .ctrl-btn.active { background: rgba(248,113,113,0.15); border-color: var(--red); color: var(--red); }

  .ctrl-icon { font-size: 1.3rem; line-height: 1; }
  .ctrl-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .ctrl-btn.active .ctrl-label { color: var(--red); }

  .btn-leave-call {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(248,113,113,0.15);
    border: 1px solid var(--red);
    border-radius: 14px;
    padding: 12px 24px;
    color: var(--red);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.875rem;
    transition: all 0.2s;
  }
  .btn-leave-call:hover { background: rgba(248,113,113,0.25); }

  /* Notifications */
  .notif {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 0.875rem;
    box-shadow: var(--shadow);
    z-index: 9999;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    max-width: 280px;
  }
  .notif.show { opacity: 1; transform: translateY(0); }
  .notif-info { border-color: var(--accent); }
  .notif-success { border-color: var(--green); color: var(--green); }
  .notif-warning { border-color: var(--yellow); color: var(--yellow); }
  .notif-error { border-color: var(--red); color: var(--red); }

  /* Config warning */
  .config-warning {
    background: rgba(251,191,36,0.1);
    border: 1px solid rgba(251,191,36,0.4);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.8rem;
    color: var(--yellow);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .config-warning a { color: var(--accent2); text-decoration: underline; }


  /* ===== CALL MODE SELECTOR ===== */
  .mode-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .mode-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 10px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
  }

  .mode-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .mode-btn.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.15);
    color: var(--text);
  }

  .mode-icon { font-size: 1.5rem; line-height: 1; }
  .mode-label { font-size: 0.8rem; font-weight: 600; font-family: 'Syne', sans-serif; }

  /* ===== AUDIO AVATAR ===== */
  .video-tile.audio-only {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
  }

  .audio-avatar {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-circle {
    width: clamp(56px, 20%, 90px);
    height: clamp(56px, 20%, 90px);
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: #fff;
    box-shadow: 0 0 0 4px rgba(108,99,255,0.3), 0 8px 24px rgba(0,0,0,0.4);
    animation: avatarPulse 3s ease-in-out infinite;
  }

  @keyframes avatarPulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(108,99,255,0.3), 0 8px 24px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 0 0 10px rgba(108,99,255,0.1), 0 8px 24px rgba(0,0,0,0.4); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .join-card { padding: 32px 24px; }
    #chat-panel.open { width: 100%; position: absolute; top: 0; right: 0; bottom: 60px; z-index: 10; }
    .ctrl-label { display: none; }
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="join-card">
    <div class="logo">SanChat</div>
    <div class="tagline">Unlimited users · Real-time video & chat</div>

    <label>Call Type</label>
    <div class="mode-selector">
      <button class="mode-btn selected" data-mode="video">
        <span class="mode-icon">📹</span>
        <span class="mode-label">Video Call</span>
      </button>
      <button class="mode-btn" data-mode="audio">
        <span class="mode-icon">🎙️</span>
        <span class="mode-label">Voice Call</span>
      </button>
    </div>

    <label>Your Name</label>
    <input type="text" id="input-name" placeholder="Enter your name..." autocomplete="off">

    <label>Room ID</label>
    <div class="room-row">
      <input type="text" id="input-room" placeholder="Enter or generate room ID...">
      <button class="btn-icon" id="btn-new-room" title="Generate Room ID">🎲 New</button>
    </div>

    <button class="btn-primary" id="btn-join">Join Room →</button>

    <div class="features">
      <div class="feature-pill">📹 Video</div>
      <div class="feature-pill">🎙️ Audio</div>
      <div class="feature-pill">💬 Chat</div>
      <div class="feature-pill">♾️ Unlimited</div>
    </div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call-screen">
  <!-- Top bar -->
  <div class="call-bar">
    <div class="logo">SanChat</div>
    <div class="room-badge" id="btn-copy-room">
      <div class="live-dot"></div>
      Room: <span id="room-id-display">—</span>
      <span style="opacity:0.5">📋</span>
    </div>
    <div id="call-mode-badge" style="font-size:0.78rem;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;">📹 Video Call</div>
  </div>

  <!-- Content -->
  <div class="call-content">
    <div id="video-grid"></div>
    <div id="chat-panel">
      <div class="chat-header">💬 Group Chat</div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Type a message…">
        <button id="chat-send">➤</button>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <button class="ctrl-btn" id="btn-mute">
      <span class="ctrl-icon">🎙️</span>
      <span class="ctrl-label">Mute</span>
    </button>
    <button class="ctrl-btn" id="btn-video">
      <span class="ctrl-icon">📹</span>
      <span class="ctrl-label">Video</span>
    </button>
    <button class="ctrl-btn" id="btn-chat">
      <span class="ctrl-icon">💬</span>
      <span class="ctrl-label">Chat</span>
    </button>
    <button class="btn-leave-call" id="btn-leave">
      📴 Leave Room
    </button>
  </div>
</div>

</body>
</html>
